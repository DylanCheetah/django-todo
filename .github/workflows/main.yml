name: Check Code
on: [push]
jobs:
  lint_python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: |
          pip install flake8
      - name: Lint Code
        run: |
          flake8 --extend-exclude migrations,settings.py
  django_unit_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Project Dependencies
        run: |
          cd django_todo
          pip install -r requirements.txt
      - name: Run Unit Tests
        run: |
          cd django_todo
          python manage.py test
